name: Build and publish web binaries

on:
  push:
    tags:
      - "v*.*.*"

env:
  APP_PATH: apps/web
  TAG_NAME: ${{ github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Enable corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all Deno binaries
        run: |
          task web:build
          task web:deno:prepare
          task web:deno:build:linux:x64
          task web:deno:build:linux:arm64
          task web:deno:build:darwin:x64
          task web:deno:build:darwin:arm64
          task web:deno:build:windows:x64

      - name: Rename binaries with tag
        working-directory: ${{ env.APP_PATH }}/dist
        run: |
          mv aidoris-web-linux-x64 aidoris-web-linux-x64-${TAG_NAME}
          mv aidoris-web-linux-arm64 aidoris-web-linux-arm64-${TAG_NAME}
          mv aidoris-web-darwin-x64 aidoris-web-darwin-x64-${TAG_NAME}
          mv aidoris-web-darwin-arm64 aidoris-web-darwin-arm64-${TAG_NAME}
          mv aidoris-web-windows-x64.exe aidoris-web-windows-x64-${TAG_NAME}.exe

      - name: Upload binaries as artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-binaries-${{ github.ref_name }}
          path: |
            ${{ env.APP_PATH }}/dist/**

  release:
    runs-on: ubuntu-latest
    needs:
      - build

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-binaries-${{ github.ref_name }}
          path: dist

      - name: Generate changelog
        run: |
          CURRENT_TAG="${TAG_NAME}"
          PREV_TAG="$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || true)"

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
            echo "Generating changelog from ${PREV_TAG} to ${CURRENT_TAG}"
          else
            FIRST_COMMIT="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
            RANGE="${FIRST_COMMIT}..${CURRENT_TAG}"
            echo "No previous tag found, generating changelog from first commit (${FIRST_COMMIT}) to ${CURRENT_TAG}"
          fi

          echo "# Changelog for ${CURRENT_TAG}" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          git log $RANGE --pretty=format:'- %s (%h)' >> CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Web binaries ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
